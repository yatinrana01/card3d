name: cart3d
description: "An Ecommerce app with 3d models"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  model_viewer_plus: ^1.9.3
  cached_network_image: ^3.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/hoodie.png

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/sneaker.png
    - data/

